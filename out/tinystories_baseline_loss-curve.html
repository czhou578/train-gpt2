  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    flex-direction: column;
    align-items: center;
    padding: 32px 24px;
    min-height: 100vh;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #fafafa;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .subtitle { font-size: 13px; color: #71717a; margin-bottom: 20px; }

  /* Stat tiles */
  #stat-tiles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 960px;
    width: 100%;
    margin-bottom: 24px;
  }
  .stat-tile {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 12px 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #fafafa;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 11px;
    color: #71717a;
    margin-top: 2px;
  }

  /* Chart */
  .chart-container {
    position: relative;
    width: 100%;
    max-width: 960px;
    background: #141419;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 24px 0 0 0;
  }
  .chart-header {
    padding: 0 24px 16px 24px;
  }
  .chart-title {
    font-size: 14px;
    font-weight: 500;
    color: #d4d4d8;
  }

  svg { width: 100%; display: block; }

  /* Tooltip */
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: #1e1e2e;
    border: 1px solid #3e3e50;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.7;
    color: #d4d4d8;
    white-space: nowrap;
    opacity: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 10;
    transition: opacity 0.1s;
  }
  #tooltip.visible { opacity: 1; }
  .tt-iter { color: #71717a; font-size: 11px; }
  .tt-tr { color: #60a5fa; }
  .tt-val { color: #fbbf24; }

  /* Crosshair */
  .crosshair-v {
    stroke: #3f3f46;
    stroke-width: 1;
    stroke-dasharray: 4 3;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .crosshair-v.visible { opacity: 0.7; }
  .hover-dot {
    r: 5;
    stroke-width: 2;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .hover-dot.visible { opacity: 1; filter: drop-shadow(0 0 6px currentColor); }

  /* Grid */
  .grid-line { stroke: #202028; stroke-width: 1; }
  .axis-text {
    fill: #71717a;
    font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .axis-label-text {
    fill: #52525b;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    text-anchor: middle;
  }

  /* Data */
  .area-tr {
    fill: url(#grad-tr);
    opacity: 0.15;
  }
  .line-tr {
    fill: none;
    stroke: #3b82f6;
    stroke-width: 2.5;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .dot-val {
    fill: #f59e0b;
    stroke: #141419;
    stroke-width: 2;
    r: 5;
  }
  .line-val-dash {
    fill: none;
    stroke: #f59e0b;
    stroke-width: 2;
    stroke-dasharray: 6 4;
    stroke-linecap: round;
    opacity: 0.6;
  }

  /* Legend */
  .legend-line { stroke-width: 2.5; }
  .legend-dot-shape { stroke-width: 2; }
  .legend-text {
    fill: #a1a1aa;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
</style>
</head>

  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);

}

// SCALES
function linScale([domainMin, domainMax], [rangeMin, rangeMax]) {
  return {
    encode: v => rangeMin + (v - domainMin) / (domainMax - domainMin) * (rangeMax - rangeMin),
    invert: p => domainMin + (p - rangeMin) / (rangeMax - rangeMin) * (domainMax - domainMin)
  };
}

svg.appendChild(hoverVal);

// Overlay
const overlay = el('rect', { x: M.left, y: M.top, width: pw, height: ph, fill: 'transparent', cursor: 'crosshair' });
svg.appendChild(overlay);

const tooltip = document.getElementById('tooltip');

overlay.addEventListener('mousemove', (e) => {
  const rect = svg.getBoundingClientRect();
  const svgX = ((e.clientX - rect.left) / rect.width) * W;
  const iter = Math.round(((svgX - M.left) / pw) * 2000);
  const clamped = Math.max(0, Math.min(2000, iter));
  const sx = M.left + xScale.encode(clamped);

  crossV.setAttribute('x1', sx);
  crossV.setAttribute('x2', sx);
  crossV.classList.add('visible');

  // Nearest train loss
  const ti = Math.min(DATA.train.length - 1, Math.max(0, Math.round(clamped)));
  const td = DATA.train[ti];
  const ty = M.top + yScale.encode(td[1]);
  hoverTr.setAttribute('cx', sx);
  hoverTr.setAttribute('cy', ty);
  hoverTr.classList.add('visible');

  // Check for val point near this iter
  const vp = valPts.find(p => Math.abs(p.cx - sx) < 20);
  if (vp) {
    hoverVal.setAttribute('cx', vp.cx);
    hoverVal.setAttribute('cy', vp.cy);
    hoverVal.classList.add('visible');
  } else {
    hoverVal.classList.remove('visible');
  }

  // Find val loss at nearest eval
  let valText = '';
  const nearestEval = DATA_EVAL_TRAIN.reduce((a, b) =>
    Math.abs(b[0] - clamped) < Math.abs(a[0] - clamped) ? b : a
  );
  if (Math.abs(nearestEval[0] - clamped) < 100) {
    valText = `<div class="tt-val">val loss: ${nearestEval[1].toFixed(4)}</div>`;
  }

  tooltip.innerHTML = `
    <div class="tt-iter">iteration ${clamped.toLocaleString()}</div>
    <div class="tt-tr">train loss: ${td[1].toFixed(4)}</div>
    ${valText}
  `;
  tooltip.classList.add('visible');

  const ttX = sx + 16;
  const ttY = ty - 10;
  tooltip.style.left = Math.min(ttX, 800) + 'px';
  tooltip.style.top = Math.max(4, ttY) + 'px';
});

overlay.addEventListener('mouseleave', () => {
  crossV.classList.remove('visible');
  hoverTr.classList.remove('visible');
  hoverVal.classList.remove('visible');
  tooltip.classList.remove('visible');
});

// STAT TILES
const finalTrain = DATA.train[DATA.train.length - 1][1];
const initialTrain = DATA.train[0][1];
const reduction = ((1 - finalTrain / initialTrain) * 100).toFixed(1);
const valFinal = DATA_EVAL_TRAIN[1][1];
const tiles = [
  { value: finalTrain.toFixed(4), label: 'Final Train Loss' },
  { value: valFinal.toFixed(2), label: 'Final Val Loss' },
  { value: `${reduction}%`, label: 'Loss Reduction' },
  { value: '2,001', label: 'Training Steps' },
];
const tileGrid = document.getElementById('stat-tiles');
tiles.forEach(t => {
  const d = document.createElement('div');
  d.className = 'stat-tile';
  d.innerHTML = `<div class="stat-value">${t.value}</div><div class="stat-label">${t.label}</div>`;
  tileGrid.appendChild(d);
});
</script>

</body>
</html>
